 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="Lista_de_Tarefas/css/reset.css">
    <link rel="stylesheet" href="Lista_de_Tarefas/css/estilo.css">
 </head>
 <body>
    <section class="container">
        <h1>Lista de Tarefas</h1>
        <form class="task_input_container">
            <input type="text" id="taskInput" placeholder="Digite a tarefa">
            <button type="submit">+</button>
        </form>
        <ul class="task_list">
            <li class="task_item">Titulo
               <div class="task_actions">
                    <button>&#9998;</button>  <!-- editar -->
                    <button>&#10003;</button> <!-- concluir -->
                    <button>&#128465;</button> <!-- apagar -->
               </div>
            </li>
        </ul>
        <div class="progress_container">
            <div class="progress_bar" id="progress_bar"></div>
        </div>
    </section>
 </body>
 </html>
